[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codriver"
version = "0.1.0"
description = "Drive Claude Code from Telegram voice notes."
requires-python = ">=3.11"
dependencies = [
    "python-telegram-bot>=21",
    "faster-whisper>=1.0",
    "httpx>=0.27",
    "tomli-w>=1.0",
]

[project.scripts]
codriver = "codriver.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["codriver"]
