name: CI

on:
  push:
  pull_request:

jobs:
  test:
    # heyclaude is macOS-only (uses the `say` voice + Apple audio), so the test
    # matrix runs on macOS to match the supported platform.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        # The suite is pure-function only — no token, network, or model download.
        run: pytest tests/ -v
